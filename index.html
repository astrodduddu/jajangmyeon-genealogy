<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>자장면 계보도 v10</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#e0e1e1;font-family:'Malgun Gothic',sans-serif;overflow:hidden;width:100vw;height:100vh;display:flex;flex-direction:column;user-select:none}
#toolbar{height:42px;min-height:42px;background:#111118;display:flex;align-items:center;padding:0 12px;gap:8px;border-bottom:1px solid #222;z-index:100}
#toolbar .sep{width:1px;height:22px;background:#333;margin:0 4px}
.tb{background:#222230;color:#ccc;border:1px solid #333;border-radius:5px;padding:4px 10px;font-size:12px;cursor:pointer;font-family:inherit;white-space:nowrap}
.tb:hover{background:#333;color:#fff}
.tb.on{background:#2e86de;color:#fff;border-color:#2e86de}
#zd{color:#888;font-size:11px;min-width:48px;text-align:center}
.tit{flex:1;text-align:center;color:#f5e6c8;font-size:13px;letter-spacing:1px;opacity:.7}
#vp{flex:1;overflow:hidden;position:relative;cursor:grab}
#vp.drag{cursor:grabbing}
#vp.edit{cursor:crosshair}
#fb{height:36px;min-height:36px;background:#111118;display:flex;align-items:center;justify-content:center;gap:14px;border-top:1px solid #222;z-index:100}
.rf{display:flex;align-items:center;gap:4px;cursor:pointer;font-size:11px;color:#aaa}
.rf input{display:none}
.rf .dot{width:10px;height:10px;border-radius:50%;background:var(--c);border:1.5px solid var(--c)}
.rf input:not(:checked)~.dot{background:transparent;opacity:.4}
.rf input:not(:checked)~.lb{opacity:.35;text-decoration:line-through}
.rf:hover{color:#fff}
#lt{position:fixed;top:52px;right:12px;z-index:200;background:#111118;color:#f5e6c8;border:1px solid #333;border-radius:6px;padding:6px 12px;font-size:12px;cursor:pointer;display:flex;align-items:center;gap:5px;box-shadow:0 2px 8px rgba(0,0,0,.3);font-family:inherit}
#lt:hover{background:#222230}
#lp{position:fixed;top:90px;right:12px;z-index:199;width:240px;height:380px;background:#111118;border:1px solid #222230;border-radius:8px;box-shadow:0 8px 32px rgba(0,0,0,.5);padding:8px;display:none;opacity:0;transform:translateY(-8px);transition:opacity .25s,transform .25s}
#lp.vis{display:block;opacity:1;transform:translateY(0)}
#toast{position:fixed;bottom:52px;left:50%;transform:translateX(-50%);background:#2e86de;color:#fff;padding:6px 16px;border-radius:20px;font-size:12px;opacity:0;transition:opacity .3s;z-index:300;pointer-events:none}
#toast.s{opacity:1}
#guide{position:fixed;top:52px;left:50%;transform:translateX(-50%);background:#e17055;color:#fff;padding:6px 16px;border-radius:20px;font-size:12px;z-index:300;display:none}
#guide.s{display:block}
#mo{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;align-items:center;justify-content:center}
#mo.s{display:flex}
#md{background:#1a1a24;border:1px solid #333;border-radius:10px;padding:20px;min-width:340px;max-width:500px;color:#ccc;font-size:13px}
#md h3{color:#f5e6c8;margin-bottom:12px;font-size:15px}
#md label{display:block;margin:8px 0 4px;color:#aaa;font-size:11px}
#md input,#md textarea{width:100%;background:#111118;border:1px solid #333;border-radius:5px;padding:6px 10px;color:#fff;font-family:inherit;font-size:13px}
#md textarea{height:60px;resize:vertical}
.br{display:flex;gap:8px;margin-top:16px;justify-content:flex-end}
.br button{padding:6px 16px;border-radius:5px;border:none;font-size:12px;cursor:pointer;font-family:inherit}
.bsv{background:#2e86de;color:#fff}
.bcn{background:#333;color:#aaa}
.sc{display:flex;align-items:center;gap:8px}
.sc input[type=range]{flex:1}
.sv{min-width:32px;text-align:center;color:#fff}
#badge{position:fixed;bottom:44px;left:12px;z-index:200;background:rgba(17,17,24,.85);color:#888;font-size:10px;padding:4px 10px;border-radius:4px;border:1px solid #333}

/* === Korea Detail v9 === */
#back-btn{display:none;position:fixed;top:52px;left:12px;z-index:200;background:#111118;color:#f5e6c8;border:1px solid #333;border-radius:6px;padding:6px 14px;font-size:12px;cursor:pointer;font-family:inherit;box-shadow:0 2px 8px rgba(0,0,0,.3)}
#back-btn:hover{background:#222230;color:#fff}
#toggle-bar{display:none;position:fixed;top:52px;left:50%;transform:translateX(-50%);z-index:200;background:rgba(17,17,24,.92);border:1px solid #333;border-radius:8px;padding:5px 10px;gap:6px;align-items:center;box-shadow:0 2px 12px rgba(0,0,0,.4)}
.tg-btn{background:#222230;color:#aaa;border:1px solid #444;border-radius:5px;padding:4px 12px;font-size:11px;cursor:pointer;font-family:inherit;transition:all .2s}
.tg-btn:hover{color:#fff;border-color:#888}
.tg-btn.on{color:#fff;background:#444;border-color:#aaa}
.tg-sep{width:1px;height:18px;background:#444;margin:0 2px}
#Layer_한국_detail{display:none}
.cat-g{display:none;opacity:0;transition:opacity .3s}
.cat-g.vis{display:block;opacity:1}
#Layer_Y축 text[data-zoom]{cursor:pointer}
#Layer_Y축 text[data-zoom]:hover{opacity:.7}

/* === Cloud Sync v10 === */
.tb.cloud{background:#1a6b3c;border-color:#1a6b3c}
.tb.cloud:hover{background:#22874c}
.tb.cloud.off{background:#555;border-color:#555;opacity:.6}
#sync-status{font-size:10px;color:#888;display:flex;align-items:center;gap:4px}
#sync-status .dot-s{width:6px;height:6px;border-radius:50%;background:#555}
#sync-status .dot-s.ok{background:#2ecc71}
#sync-status .dot-s.err{background:#e74c3c}
#sync-status .dot-s.busy{background:#f39c12;animation:pulse .8s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
#cfg-mo{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:600;align-items:center;justify-content:center}
#cfg-mo.s{display:flex}
#cfg-md{background:#1a1a24;border:1px solid #333;border-radius:10px;padding:24px;width:480px;max-width:90vw;color:#ccc;font-size:13px}
#cfg-md h3{color:#f5e6c8;margin-bottom:6px;font-size:15px}
#cfg-md .sub{color:#888;font-size:11px;margin-bottom:16px}
#cfg-md label{display:block;margin:10px 0 4px;color:#aaa;font-size:11px}
#cfg-md input{width:100%;background:#111118;border:1px solid #333;border-radius:5px;padding:8px 10px;color:#fff;font-family:inherit;font-size:12px}
#cfg-md input::placeholder{color:#555}
#cfg-md .hint{color:#666;font-size:10px;margin-top:3px}
.cfg-row{display:flex;align-items:center;gap:8px;margin-top:8px}
.cfg-row label{margin:0;white-space:nowrap;min-width:70px}
#cfg-md .chk-row{display:flex;align-items:center;gap:6px;margin-top:12px;cursor:pointer}
#cfg-md .chk-row input[type=checkbox]{width:auto;accent-color:#2e86de}
</style>

<button class="tb" onclick="zoomFit()">⊞</button>
<button class="tb" onclick="zoomStep(-1)">−</button>
<span id="zd">100%</span>
<button class="tb" onclick="zoomStep(1)">+</button>
<div class="sep"></div>
<button class="tb" id="be" onclick="toggleEdit()">✎ 편집</button>
<button class="tb" id="bat" onclick="startAdd('text')" style="display:none">T+ 글</button>
<button class="tb" id="bad" onclick="startAdd('circle')" style="display:none">●+ 점</button>
<div class="sep"></div>
<button class="tb" onclick="expJSON()">⤓ JSON</button>
<div class="sep"></div>
<button class="tb cloud" id="btn-save" onclick="saveToCloud()" title="Google Sheets에 저장">☁↑ 저장</button>
<button class="tb cloud" id="btn-load" onclick="loadFromCloud()" title="Google Sheets에서 불러오기">☁↓ 불러오기</button>
<button class="tb" onclick="openCfg()" title="클라우드 설정">⚙</button>
<span id="sync-status"><span class="dot-s"></span><span id="sync-txt"></span></span>
<div class="tit">자장면(炸醬面) 지역별 계보도</div>
</div>

    <text class="st5" transform="translate(2137 -84)"><tspan x="0" y="0">辣豆瓣+番茄醬 (홍콩 극변)</tspan></text>

</div></div>

<script>
var svg = document.getElementById('main-svg');
var vp = document.getElementById('vp');
var BW = 2320, BH = 1120;
var vx = 0, vy = 0, vw = BW, vh = BH;

function setVB() {
  svg.setAttribute('viewBox', vx+' '+vy+' '+vw+' '+vh);
  document.getElementById('zd').textContent = Math.round(BW/vw*100)+'%';
}

function zoomAt(f, cx, cy) {
  var r = vp.getBoundingClientRect();
  var mx = (cx-r.left)/r.width;
  var my = (cy-r.top)/r.height;
  var sx = vx + mx*vw;
  var sy = vy + my*vh;
  var nw = Math.max(200, Math.min(BW*4, vw/f));
  var nh = nw*(BH/BW);
  vx = sx - mx*nw;
  vy = sy - my*nh;
  vw = nw;
  vh = nh;
  setVB();
}

function zoomStep(d) {
  var r = vp.getBoundingClientRect();
  zoomAt(d>0?1.25:0.8, r.left+r.width/2, r.top+r.height/2);
}

function zoomFit() {
  vx=0; vy=0; vw=BW; vh=BH;
  setVB();
}

// Wheel zoom
vp.addEventListener('wheel', function(e) {
  e.preventDefault();
  zoomAt(e.deltaY<0?1.12:0.89, e.clientX, e.clientY);
}, {passive:false});

// Drag pan
var dg=false, dsx=0, dsy=0, dvx=0, dvy=0;
vp.addEventListener('mousedown', function(e) {
  if (addM) return;
  if (edM && e.target.closest('text,circle')) return;
  dg=true; dsx=e.clientX; dsy=e.clientY; dvx=vx; dvy=vy;
  vp.classList.add('drag');
});
window.addEventListener('mousemove', function(e) {
  if(!dg) return;
  var r=vp.getBoundingClientRect();
  vx=dvx-(e.clientX-dsx)/r.width*vw;
  vy=dvy-(e.clientY-dsy)/r.height*vh;
  setVB();
});
window.addEventListener('mouseup', function() {
  dg=false; vp.classList.remove('drag');
});

// Touch
var ltd=0;
vp.addEventListener('touchstart', function(e) {
  if(e.touches.length===2) {
    var dx=e.touches[0].clientX-e.touches[1].clientX;
    var dy=e.touches[0].clientY-e.touches[1].clientY;
    ltd=Math.sqrt(dx*dx+dy*dy);
  } else if(e.touches.length===1) {
    dg=true; dsx=e.touches[0].clientX; dsy=e.touches[0].clientY; dvx=vx; dvy=vy;
  }
},{passive:true});
vp.addEventListener('touchmove', function(e) {
  if(e.touches.length===2) {
    e.preventDefault();
    var dx=e.touches[0].clientX-e.touches[1].clientX;
    var dy=e.touches[0].clientY-e.touches[1].clientY;
    var d=Math.sqrt(dx*dx+dy*dy);
    var cx=(e.touches[0].clientX+e.touches[1].clientX)/2;
    var cy=(e.touches[0].clientY+e.touches[1].clientY)/2;
    zoomAt(d/ltd, cx, cy);
    ltd=d;
  } else if(dg&&e.touches.length===1) {
    var r=vp.getBoundingClientRect();
    vx=dvx-(e.touches[0].clientX-dsx)/r.width*vw;
    vy=dvy-(e.touches[0].clientY-dsy)/r.height*vh;
    setVB();
    dsx=e.touches[0].clientX; dsy=e.touches[0].clientY; dvx=vx; dvy=vy;
  }
},{passive:false});
vp.addEventListener('touchend', function(){dg=false;});

// Keyboard
document.addEventListener('keydown', function(e) {
  if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA') return;
  if(e.key==='='||e.key==='+') zoomStep(1);
  if(e.key==='-') zoomStep(-1);
  if(e.key==='0') zoomFit();
  if(e.key==='Escape') { closeLeg(); cancelAdd(); closeMo(); if(document.getElementById('cfg-mo').classList.contains('s'))closeCfg(); }
});

setVB();

// ── 지역 필터 ──
function toggleRegion(cb) {
  var lid = cb.closest('.rf').dataset.layer;
  var vis = cb.checked;

  // 1. 레이어 그룹 자체 토글
  var el = svg.querySelector('#'+CSS.escape(lid));
  if(el) el.style.display = vis?'':'none';

  // 2. data-region으로 태그된 고아 요소 토글
  svg.querySelectorAll('[data-region]').forEach(function(orphan) {
    var regions = orphan.getAttribute('data-region').split(' ');
    if(regions.indexOf(lid) === -1) return; // 이 레이어와 무관

    // 여러 지역에 걸친 요소: 하나라도 켜져 있으면 보이기
    var anyVisible = regions.some(function(r) {
      var chk = document.querySelector('.rf[data-layer="'+r+'"] input');
      return chk ? chk.checked : true;
    });
    orphan.style.display = anyVisible ? '' : 'none';
  });
}

// ── 범례 ──
var legO = false;
function toggleLeg() {
  var lp = document.getElementById('lp');
  legO = !legO;
  if(legO) { lp.style.display='block'; lp.offsetHeight; lp.classList.add('vis'); }
  else { lp.classList.remove('vis'); setTimeout(function(){lp.style.display='none';},250); }
}
function closeLeg() {
  if(!legO) return;
  var lp = document.getElementById('lp');
  legO=false; lp.classList.remove('vis');
  setTimeout(function(){lp.style.display='none';},250);
}

// ── 편집 ──
var edM=false, addM=null, curT=null, saveFn=null;

function toast(m) {
  var t=document.getElementById('toast');
  t.textContent=m; t.classList.add('s');
  setTimeout(function(){t.classList.remove('s');},2000);
}

function toggleEdit() {
  edM=!edM;
  document.getElementById('be').classList.toggle('on',edM);
  vp.classList.toggle('edit',edM);
  document.getElementById('bat').style.display=edM?'':'none';
  document.getElementById('bad').style.display=edM?'':'none';
  if(edM) {
    toast('편집 ON: 더블클릭 수정 / T+ ●+ 추가');
    svg.querySelectorAll('text').forEach(function(t){t.addEventListener('dblclick',txtDbl);t.style.cursor='text';});
    svg.querySelectorAll('circle').forEach(function(c){c.addEventListener('dblclick',cirDbl);c.style.cursor='pointer';});
  } else {
    svg.querySelectorAll('text').forEach(function(t){t.removeEventListener('dblclick',txtDbl);t.style.cursor='';});
    svg.querySelectorAll('circle').forEach(function(c){c.removeEventListener('dblclick',cirDbl);c.style.cursor='';});
    cancelAdd();
    toast('편집 OFF');
  }
}

function txtDbl(e) {
  e.stopPropagation();
  var el=e.currentTarget;
  curT={type:'text',el:el};
  var ts=el.querySelectorAll('tspan');
  var txt=ts.length?Array.from(ts).map(function(t){return t.textContent;}).join(''):el.textContent;
  var tr=el.getAttribute('transform')||'';
  var m=tr.match(/translate\(([\d.\-]+)[,\s]+([\d.\-]+)\)/);
  document.getElementById('mt').textContent='텍스트 편집';
  document.getElementById('mb').innerHTML=
    '<label>내용</label><textarea id="ev">'+txt+'<\/textarea>'+
    '<div style="display:flex;gap:12px">'+
    '<div style="flex:1"><label>X</label><input type="number" id="ex" value="'+(m?m[1]:'0')+'" step="1"><\/div>'+
    '<div style="flex:1"><label>Y</label><input type="number" id="ey" value="'+(m?m[2]:'0')+'" step="1"><\/div><\/div>';
  saveFn=function(){
    var v=document.getElementById('ev').value;
    var x=document.getElementById('ex').value;
    var y=document.getElementById('ey').value;
    el.setAttribute('transform','translate('+x+' '+y+')');
    var tss=el.querySelectorAll('tspan');
    if(tss.length){tss[0].textContent=v;tss[0].setAttribute('x','0');tss[0].setAttribute('y','0');for(var i=tss.length-1;i>0;i--)tss[i].remove();}
    else el.textContent=v;
    toast('수정 완료');closeMo();
  };
  openMo();
}

function cirDbl(e) {
  e.stopPropagation();
  var c=e.currentTarget;
  curT={type:'circle',el:c};
  document.getElementById('mt').textContent='포인트 편집';
  document.getElementById('mb').innerHTML=
    '<label>반지름</label><div class="sc">'+
    '<input type="range" id="er" min="1" max="30" step="0.5" value="'+c.getAttribute('r')+
    '" oninput="document.getElementById(\'rv\').textContent=this.value">'+
    '<span class="sv" id="rv">'+c.getAttribute('r')+'<\/span><\/div>'+
    '<div style="display:flex;gap:12px">'+
    '<div style="flex:1"><label>X</label><input type="number" id="ecx" value="'+c.getAttribute('cx')+'" step="1"><\/div>'+
    '<div style="flex:1"><label>Y</label><input type="number" id="ecy" value="'+c.getAttribute('cy')+'" step="1"><\/div><\/div>';
  saveFn=function(){
    c.setAttribute('r',document.getElementById('er').value);
    c.setAttribute('cx',document.getElementById('ecx').value);
    c.setAttribute('cy',document.getElementById('ecy').value);
    toast('수정 완료');closeMo();
  };
  openMo();
}

function openMo(){document.getElementById('mo').classList.add('s');}
function closeMo(){document.getElementById('mo').classList.remove('s');curT=null;saveFn=null;}
function doSave(){if(saveFn)saveFn();}

// ── 추가 ──
function c2s(cx,cy) {
  var pt=svg.createSVGPoint();
  pt.x=cx;pt.y=cy;
  var sp=pt.matrixTransform(svg.getScreenCTM().inverse());
  return {x:Math.round(sp.x),y:Math.round(sp.y)};
}

function startAdd(type) {
  addM=type;
  var g=document.getElementById('guide');
  g.textContent=(type==='text'?'텍스트':'점')+' 위치 클릭 (ESC 취소)';
  g.classList.add('s');
  vp.style.cursor='crosshair';
  vp.addEventListener('click',onAdd);
}

function cancelAdd() {
  addM=null;
  document.getElementById('guide').classList.remove('s');
  vp.style.cursor=edM?'crosshair':'grab';
  vp.removeEventListener('click',onAdd);
}

function onAdd(e) {
  if(!addM||dg) return;
  vp.removeEventListener('click',onAdd);
  var p=c2s(e.clientX,e.clientY);
  var ns='http://www.w3.org/2000/svg';

  if(addM==='text') {
    document.getElementById('mt').textContent='새 텍스트';
    document.getElementById('mb').innerHTML=
      '<label>내용</label><textarea id="ev"><\/textarea>'+
      '<div style="display:flex;gap:12px">'+
      '<div style="flex:1"><label>X</label><input type="number" id="ex" value="'+p.x+'" step="1"><\/div>'+
      '<div style="flex:1"><label>Y</label><input type="number" id="ey" value="'+p.y+'" step="1"><\/div><\/div>'+
      '<div style="display:flex;gap:12px">'+
      '<div style="flex:1"><label>크기</label><input type="number" id="efs" value="9" min="4" max="24"><\/div>'+
      '<div style="flex:1"><label>색상</label><input type="color" id="ecl" value="#231815"><\/div><\/div>';
    saveFn=function(){
      var v=document.getElementById('ev').value;
      if(!v.trim()){closeMo();cancelAdd();return;}
      var t=document.createElementNS(ns,'text');
      t.setAttribute('transform','translate('+document.getElementById('ex').value+' '+document.getElementById('ey').value+')');
      t.setAttribute('fill',document.getElementById('ecl').value);
      t.setAttribute('font-size',document.getElementById('efs').value+'px');
      t.setAttribute('font-family',"MalgunGothic,'Malgun Gothic'");
      var ts=document.createElementNS(ns,'tspan');
      ts.setAttribute('x','0');ts.setAttribute('y','0');ts.textContent=v;
      t.appendChild(ts);svg.appendChild(t);
      t.addEventListener('dblclick',txtDbl);t.style.cursor='text';
      toast('텍스트 추가');closeMo();cancelAdd();
    };
    openMo();
  }

  if(addM==='circle') {
    document.getElementById('mt').textContent='새 이벤트 점';
    document.getElementById('mb').innerHTML=
      '<div style="display:flex;gap:12px">'+
      '<div style="flex:1"><label>X</label><input type="number" id="ecx" value="'+p.x+'" step="1"><\/div>'+
      '<div style="flex:1"><label>Y</label><input type="number" id="ecy" value="'+p.y+'" step="1"><\/div><\/div>'+
      '<label>반지름</label><div class="sc">'+
      '<input type="range" id="er" min="1" max="30" step="0.5" value="5"'+
      ' oninput="document.getElementById(\'rv\').textContent=this.value">'+
      '<span class="sv" id="rv">5<\/span><\/div>'+
      '<label>색상</label><input type="color" id="ecl" value="#c0392b">';
    saveFn=function(){
      var c=document.createElementNS(ns,'circle');
      c.setAttribute('cx',document.getElementById('ecx').value);
      c.setAttribute('cy',document.getElementById('ecy').value);
      c.setAttribute('r',document.getElementById('er').value);
      c.setAttribute('fill',document.getElementById('ecl').value);
      svg.appendChild(c);
      c.addEventListener('dblclick',cirDbl);c.style.cursor='pointer';
      toast('점 추가');closeMo();cancelAdd();
    };
    openMo();
  }
}

// ── JSON 내보내기 ──
function expJSON() {
  var data={regions:{},added:[],time:new Date().toISOString()};
  svg.querySelectorAll('[id^="Layer_"]').forEach(function(layer){
    var rd={texts:[],circles:[]};
    layer.querySelectorAll('text').forEach(function(t){
      rd.texts.push({content:t.textContent,transform:t.getAttribute('transform')||''});
    });
    layer.querySelectorAll('circle').forEach(function(c){
      rd.circles.push({cx:c.getAttribute('cx'),cy:c.getAttribute('cy'),r:c.getAttribute('r')});
    });
    data.regions[layer.id]=rd;
  });
  var blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  var a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='자장면_계보도.json';
  a.click();
  toast('JSON 내보내기 완료');
}

// ===== KOREA DETAIL v9 =====
var koreaZoomed = false;
var KOREA_VB = {x:840, y:270, w:1400, h:300};
var FULL_VB = {x:0, y:0, w:BW, h:BH};

// Make Korea Y-axis label clickable
(function(){
  svg.querySelectorAll('#Layer_Y축 text').forEach(function(t){
    if(t.textContent.trim()==='한국'){
      t.setAttribute('data-zoom','korea');
      t.style.cursor='pointer';
      t.addEventListener('click',function(e){e.stopPropagation();zoomInKorea();});
    }
  });
})();

// Collect non-korea loose SVG elements
var looseEls=[];
(function(){
  var ch=svg.children;
  for(var i=0;i<ch.length;i++){
    var el=ch[i];
    if(el.tagName==='defs')continue;
    var id=el.id||'';
    if(id.match(/Layer_(배경|그리드|X축|Y축|한국_detail)/))continue;
    looseEls.push(el);
  }
})();

// Also collect base Layer_한국 for hiding its content
var baseKoreaLayer = svg.querySelector('#Layer_한국');

function animateViewBox(target,dur,cb){
  var s={x:vx,y:vy,w:vw,h:vh};var t0=performance.now();dur=dur||600;
  function step(now){
    var p=Math.min(1,(now-t0)/dur);
    var e=p<.5?4*p*p*p:1-Math.pow(-2*p+2,3)/2;
    vx=s.x+(target.x-s.x)*e;vy=s.y+(target.y-s.y)*e;
    vw=s.w+(target.w-s.w)*e;vh=s.h+(target.h-s.h)*e;
    setVB();
    if(p<1)requestAnimationFrame(step);else if(cb)cb();
  }
  requestAnimationFrame(step);
}

function zoomInKorea(){
  if(koreaZoomed)return;koreaZoomed=true;
  // Hide everything except grid, axes, and Korea detail
  looseEls.forEach(function(el){el.style.display='none';});
  // Hide base Korea layer (it has overlapping text)
  if(baseKoreaLayer) baseKoreaLayer.style.display='none';
  document.getElementById('fb').style.display='none';
  document.getElementById('lt').style.display='none';
  // Hide existing grid/axes (replaced by decade grid)
  var xAxis=svg.querySelector('#Layer_X축');
  var yAxis=svg.querySelector('#Layer_Y축');
  var grid=svg.querySelector('#Layer_그리드');
  if(xAxis)xAxis.style.display='none';
  if(yAxis)yAxis.style.display='none';
  if(grid)grid.style.display='none';
  // Show detail
  var dl=svg.querySelector('#Layer_한국_detail');
  dl.style.display='block';
  // Show all 3 toggles by default
  ['food','space','era'].forEach(function(cat){
    svg.querySelectorAll('.cat-g[data-cat="'+cat+'"]').forEach(function(g){
      g.style.display='block';g.classList.add('vis');
    });
  });
  document.getElementById('back-btn').style.display='block';
  document.getElementById('toggle-bar').style.display='flex';
  animateViewBox(KOREA_VB,700);
  toast('한국 자장면 계보 상세 — ESC로 복귀');
}

function zoomOutKorea(){
  if(!koreaZoomed)return;koreaZoomed=false;
  // Reset toggles — all ON by default
  document.querySelectorAll('.tg-btn').forEach(function(b){
    b.classList.add('on');
  });
  svg.querySelectorAll('.cat-g').forEach(function(g){g.classList.remove('vis');g.style.display='none';});
  // Hide detail
  svg.querySelector('#Layer_한국_detail').style.display='none';
  // Restore grid/axes
  var xAxis=svg.querySelector('#Layer_X축');
  var yAxis=svg.querySelector('#Layer_Y축');
  var grid=svg.querySelector('#Layer_그리드');
  if(xAxis)xAxis.style.display='';
  if(yAxis)yAxis.style.display='';
  if(grid)grid.style.display='';
  // Restore everything
  looseEls.forEach(function(el){el.style.display='';});
  if(baseKoreaLayer) baseKoreaLayer.style.display='';
  document.getElementById('fb').style.display='';
  document.getElementById('lt').style.display='';
  document.getElementById('back-btn').style.display='none';
  document.getElementById('toggle-bar').style.display='none';
  animateViewBox(FULL_VB,700);
}

function toggleCat(btn){
  btn.classList.toggle('on');
  var cat=btn.dataset.cat;
  var isOn=btn.classList.contains('on');
  svg.querySelectorAll('.cat-g[data-cat="'+cat+'"]').forEach(function(g){
    if(isOn){g.style.display='block';setTimeout(function(){g.classList.add('vis');},30);}
    else{g.classList.remove('vis');setTimeout(function(){g.style.display='none';},300);}
  });
}

document.addEventListener('keydown',function(e){
  if(e.key==='Escape'&&koreaZoomed)zoomOutKorea();
});

</script>

<div class="sub">Google Apps Script 웹 앱 URL을 입력하면 Google Sheets에 데이터를 저장/불러올 수 있습니다.</div>
<label>Apps Script 웹 앱 URL</label>
<input type="text" id="cfg-url" placeholder="https://script.google.com/macros/s/XXXX/exec">
<div class="hint">배포 → 새 배포 → 웹 앱 → '모든 사용자' 접근 허용 후 URL 복사</div>
<label class="chk-row"><input type="checkbox" id="cfg-auto"> 편집 후 자동 저장 (30초 딜레이)</label>
<div class="br">
<button class="bcn" onclick="closeCfg()">닫기</button>
<button class="bsv" onclick="saveCfg()">저장</button>
<button class="bsv" onclick="testConn()" style="background:#1a6b3c">연결 테스트</button>
</div>
</div>
</div>

<script>
// ========================================
// CLOUD SYNC v10 — Google Sheets via Apps Script
// ========================================

var DEFAULT_CLOUD_URL = 'https://script.google.com/macros/s/AKfycby9sxPm896fIp73z2yEUTm71P3igKC7nPDOiSKA2yWfn0vk2R72QxRAHaBs_BVqucAFHw/exec';
var CLOUD_URL = localStorage.getItem('jjm_cloud_url') || DEFAULT_CLOUD_URL;
var AUTO_SAVE = localStorage.getItem('jjm_auto_save') === 'true';
var autoTimer = null;

// ── 설정 모달 ──
function openCfg() {
  document.getElementById('cfg-url').value = CLOUD_URL;
  document.getElementById('cfg-auto').checked = AUTO_SAVE;
  document.getElementById('cfg-mo').classList.add('s');
}
function closeCfg() { document.getElementById('cfg-mo').classList.remove('s'); }
function saveCfg() {
  CLOUD_URL = document.getElementById('cfg-url').value.trim();
  AUTO_SAVE = document.getElementById('cfg-auto').checked;
  localStorage.setItem('jjm_cloud_url', CLOUD_URL);
  localStorage.setItem('jjm_auto_save', AUTO_SAVE ? 'true' : 'false');
  updateSyncUI();
  closeCfg();
  toast('설정 저장 완료');
}

// ── 상태 표시 ──
function setSyncStatus(state, msg) {
  var dot = document.querySelector('#sync-status .dot-s');
  var txt = document.getElementById('sync-txt');
  dot.className = 'dot-s ' + state; // '', 'ok', 'err', 'busy'
  txt.textContent = msg || '';
}

function updateSyncUI() {
  var ok = !!CLOUD_URL;
  document.getElementById('btn-save').classList.toggle('off', !ok);
  document.getElementById('btn-load').classList.toggle('off', !ok);
  if (!ok) setSyncStatus('', '미연결');
  else setSyncStatus('ok', '연결됨');
}

// ── 데이터 수집 (기존 expJSON 로직 확장) ──
function buildExportData() {
  var data = {
    version: 'v10',
    regions: {},
    added: [],
    time: new Date().toISOString()
  };

  // 레이어 내 텍스트·서클
  svg.querySelectorAll('[id^="Layer_"]').forEach(function(layer) {
    var rd = { texts: [], circles: [] };
    layer.querySelectorAll('text').forEach(function(t) {
      var ts = t.querySelectorAll('tspan');
      var content = ts.length
        ? Array.from(ts).map(function(s) { return s.textContent; }).join('\n')
        : t.textContent;
      rd.texts.push({
        content: content,
        transform: t.getAttribute('transform') || '',
        fill: t.getAttribute('fill') || '',
        fontSize: t.getAttribute('font-size') || ''
      });
    });
    layer.querySelectorAll('circle').forEach(function(c) {
      rd.circles.push({
        cx: c.getAttribute('cx'),
        cy: c.getAttribute('cy'),
        r: c.getAttribute('r'),
        fill: c.getAttribute('fill') || ''
      });
    });
    data.regions[layer.id] = rd;
  });

  // SVG 루트에 직접 추가된 요소들 (편집 모드로 추가된 것)
  var ch = svg.children;
  for (var i = 0; i < ch.length; i++) {
    var el = ch[i];
    if (el.tagName === 'defs' || el.id) continue; // id가 있으면 원래 레이어
    if (el.tagName === 'text') {
      data.added.push({
        type: 'text',
        content: el.textContent,
        transform: el.getAttribute('transform') || '',
        fill: el.getAttribute('fill') || '',
        fontSize: el.getAttribute('font-size') || ''
      });
    } else if (el.tagName === 'circle') {
      data.added.push({
        type: 'circle',
        cx: el.getAttribute('cx'),
        cy: el.getAttribute('cy'),
        r: el.getAttribute('r'),
        fill: el.getAttribute('fill') || ''
      });
    }
  }

  return data;
}

// ── 클라우드 저장 ──
function saveToCloud() {
  if (!CLOUD_URL) { openCfg(); return; }
  setSyncStatus('busy', '저장 중...');

  var data = buildExportData();

  fetch(CLOUD_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify(data),
    redirect: 'follow'
  })
  .then(function(r) {
    if (!r.ok) throw new Error('HTTP ' + r.status);
    return r.text();
  })
  .then(function(txt) {
    try { var j = JSON.parse(txt); } catch(e) {}
    setSyncStatus('ok', '저장 완료 ' + new Date().toLocaleTimeString('ko-KR', {hour:'2-digit', minute:'2-digit'}));
    toast('☁ Google Sheets 저장 완료');
  })
  .catch(function(err) {
    console.error('Cloud save error:', err);
    setSyncStatus('err', '저장 실패');
    toast('저장 실패: ' + err.message);
  });
}

// ── 클라우드 불러오기 ──
function loadFromCloud() {
  if (!CLOUD_URL) { openCfg(); return; }
  setSyncStatus('busy', '불러오는 중...');

  fetch(CLOUD_URL, { redirect: 'follow' })
  .then(function(r) {
    if (!r.ok) throw new Error('HTTP ' + r.status);
    return r.text();
  })
  .then(function(txt) {
    if (!txt || txt === '{}') {
      setSyncStatus('ok', '저장된 데이터 없음');
      toast('저장된 데이터가 없습니다');
      return;
    }
    var data;
    try { data = JSON.parse(txt); } catch(e) {
      throw new Error('JSON 파싱 실패');
    }
    applyImportData(data);
    var when = data.time ? new Date(data.time).toLocaleString('ko-KR') : '';
    setSyncStatus('ok', '불러오기 완료');
    toast('☁ 데이터 불러오기 완료' + (when ? ' (' + when + ')' : ''));
  })
  .catch(function(err) {
    console.error('Cloud load error:', err);
    setSyncStatus('err', '불러오기 실패');
    toast('불러오기 실패: ' + err.message);
  });
}

// ── 데이터 적용 (SVG에 반영) ──
function applyImportData(data) {
  if (!data || !data.regions) return;

  // 레이어별 텍스트 내용 업데이트 (위치·스타일이 바뀐 것만)
  Object.keys(data.regions).forEach(function(layerId) {
    var layer = svg.querySelector('#' + CSS.escape(layerId));
    if (!layer) return;
    var rd = data.regions[layerId];

    // 텍스트: 인덱스 매칭으로 내용 동기화
    var existingTexts = layer.querySelectorAll('text');
    rd.texts.forEach(function(td, idx) {
      if (idx < existingTexts.length) {
        var t = existingTexts[idx];
        var ts = t.querySelectorAll('tspan');
        if (ts.length && td.content.indexOf('\n') > -1) {
          var lines = td.content.split('\n');
          for (var li = 0; li < ts.length && li < lines.length; li++) {
            ts[li].textContent = lines[li];
          }
        } else if (ts.length) {
          ts[0].textContent = td.content;
        } else {
          t.textContent = td.content;
        }
        if (td.transform) t.setAttribute('transform', td.transform);
      }
    });
    // 삭제 반영: 클라우드 데이터보다 SVG에 텍스트가 더 많으면 초과분 제거
    for (var ti = existingTexts.length - 1; ti >= rd.texts.length; ti--) {
      existingTexts[ti].remove();
    }

    // 서클: 위치·크기 동기화
    var existingCircles = layer.querySelectorAll('circle');
    rd.circles.forEach(function(cd, idx) {
      if (idx < existingCircles.length) {
        var c = existingCircles[idx];
        c.setAttribute('cx', cd.cx);
        c.setAttribute('cy', cd.cy);
        c.setAttribute('r', cd.r);
        if (cd.fill) c.setAttribute('fill', cd.fill);
      }
    });
    // 삭제 반영: 클라우드 데이터보다 SVG에 서클이 더 많으면 초과분 제거
    for (var ci = existingCircles.length - 1; ci >= rd.circles.length; ci--) {
      existingCircles[ci].remove();
    }
  });

  // 기존 루즈 텍스트·서클 제거 (SVG 루트 직속, 레이어 밖 요소 — 중복 방지)
  var loose = [];
  var ch2 = svg.children;
  for (var ri = 0; ri < ch2.length; ri++) {
    var rel = ch2[ri];
    if (rel.tagName === 'defs' || rel.id) continue;
    if (rel.tagName === 'text' || rel.tagName === 'circle') loose.push(rel);
  }
  loose.forEach(function(el) { el.remove(); });

  // 편집 모드로 추가된 요소 복원 (클라우드 데이터 기준으로 재생성)
  if (data.added && data.added.length) {
    var ns = 'http://www.w3.org/2000/svg';
    data.added.forEach(function(item) {
      if (item.type === 'text') {
        var t = document.createElementNS(ns, 'text');
        if (item.transform) t.setAttribute('transform', item.transform);
        if (item.fill) t.setAttribute('fill', item.fill);
        if (item.fontSize) t.setAttribute('font-size', item.fontSize);
        t.setAttribute('font-family', "MalgunGothic,'Malgun Gothic'");
        var ts = document.createElementNS(ns, 'tspan');
        ts.setAttribute('x', '0'); ts.setAttribute('y', '0');
        ts.textContent = item.content;
        t.appendChild(ts);
        svg.appendChild(t);
      } else if (item.type === 'circle') {
        var c = document.createElementNS(ns, 'circle');
        c.setAttribute('cx', item.cx);
        c.setAttribute('cy', item.cy);
        c.setAttribute('r', item.r);
        if (item.fill) c.setAttribute('fill', item.fill);
        svg.appendChild(c);
      }
    });
  }
}

// ── 연결 테스트 ──
function testConn() {
  var url = document.getElementById('cfg-url').value.trim();
  if (!url) { toast('URL을 입력하세요'); return; }

  toast('연결 테스트 중...');
  fetch(url, { redirect: 'follow' })
  .then(function(r) { return r.text(); })
  .then(function() {
    toast('✓ 연결 성공!');
    setSyncStatus('ok', '연결 확인');
  })
  .catch(function(err) {
    toast('✗ 연결 실패: ' + err.message);
    setSyncStatus('err', '연결 실패');
  });
}

// ── 자동 저장 ──
function scheduleAutoSave() {
  if (!AUTO_SAVE || !CLOUD_URL) return;
  if (autoTimer) clearTimeout(autoTimer);
  autoTimer = setTimeout(function() {
    saveToCloud();
    autoTimer = null;
  }, 30000);
  setSyncStatus('ok', '자동 저장 예약됨');
}

// 편집 모드 동작 후 자동 저장 트리거
var origCloseMo = closeMo;
closeMo = function() {
  origCloseMo();
  scheduleAutoSave();
};

// 초기화
updateSyncUI();

// ── 페이지 로드 시 자동 불러오기 ──
if (CLOUD_URL) {
  setSyncStatus('busy', '최신 데이터 불러오는 중...');
  fetch(CLOUD_URL, { redirect: 'follow' })
  .then(function(r) { return r.text(); })
  .then(function(txt) {
    if (!txt || txt === '{}') {
      setSyncStatus('ok', '저장된 데이터 없음');
      return;
    }
    var data;
    try { data = JSON.parse(txt); } catch(e) { return; }
    applyImportData(data);
    var when = data.time ? new Date(data.time).toLocaleString('ko-KR') : '';
    setSyncStatus('ok', '최신 반영 완료');
    toast('☁ 최신 데이터 자동 로드' + (when ? ' (' + when + ')' : ''));
  })
  .catch(function(err) {
    setSyncStatus('err', '자동 로드 실패');
    console.error('Auto-load error:', err);
  });
}
</script>
</body>
</html>
